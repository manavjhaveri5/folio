<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Folio" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#18160f" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%232c2117'/><text x='90' y='128' font-size='105' text-anchor='middle' fill='%23b48a4f' font-family='serif'>ƒ</text></svg>" />
<title>Folio — a reading room for PDFs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #18160f;
    --leather: #2c2117;
    --leather-2: #1f1810;
    --brass: #b48a4f;
    --brass-bright: #d8af71;
    --moss: #5a6b4f;
    --paper: #f4eddc;
    --paper-text: #2a2114;
    --paper-shadow: rgba(20, 14, 4, 0.35);
    --chrome-text: #ece3cf;
    --chrome-text-dim: rgba(236, 227, 207, 0.55);
    --r: 3px;
    --page-filter: none;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: pan-y;
  }
  #app {
    position: relative;
    width: 100%; height: 100vh; height: 100dvh;
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, #2a2419 0%, transparent 60%),
      linear-gradient(180deg, #100e0a 0%, #18160f 50%, #0e0c08 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--chrome-text);
  }

  /* ---------- Empty state (closed book) ---------- */
  #empty-state {
    width: min(440px, 86vw);
    aspect-ratio: 3 / 4;
    background: linear-gradient(135deg, var(--leather) 0%, var(--leather-2) 100%);
    border-radius: 6px 10px 10px 6px;
    box-shadow:
      0 30px 70px rgba(0,0,0,0.55),
      inset 0 0 0 1px rgba(180,138,79,0.25),
      inset -10px 0 18px rgba(0,0,0,0.4);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    cursor: pointer;
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  #empty-state::before {
    content: "";
    position: absolute; left: 22px; top: 18px; bottom: 18px; width: 1px;
    background: linear-gradient(180deg, transparent, var(--brass), transparent);
    opacity: 0.5;
  }
  #empty-state:hover { transform: translateY(-4px); box-shadow: 0 38px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(216,175,113,0.4); }
  #empty-state.drag-over { outline: 2px dashed var(--brass-bright); outline-offset: -14px; }
  #empty-state .clasp {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid var(--brass);
    display: flex; align-items: center; justify-content: center;
    color: var(--brass-bright);
  }
  #empty-state h1 {
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 26px;
    margin: 0; letter-spacing: 0.01em; color: var(--chrome-text);
  }
  #empty-state p { margin: 0; font-size: 13px; color: var(--chrome-text-dim); text-align: center; max-width: 260px; line-height: 1.5; }
  #empty-state .hint { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brass); margin-top: 4px; }

  #library-list {
    margin-top: 6px; width: 100%; max-width: 280px; max-height: 110px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px; padding: 0 8px;
  }
  #library-list button {
    background: rgba(180,138,79,0.08); border: 1px solid rgba(180,138,79,0.25);
    color: var(--chrome-text-dim); font-size: 11.5px; text-align: left;
    padding: 6px 10px; border-radius: var(--r); cursor: pointer; font-family: 'Inter', sans-serif;
    display: flex; justify-content: space-between; gap: 8px;
  }
  #library-list button:hover { background: rgba(180,138,79,0.18); color: var(--chrome-text); }
  #library-list button span.pct { color: var(--brass-bright); flex-shrink: 0; }

  /* ---------- Book shell ---------- */
  #book {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }
  #book[hidden] { display: none; }

  #chrome-top, #chrome-bottom {
    flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 18px;
    background: linear-gradient(180deg, rgba(16,14,10,0.92), rgba(16,14,10,0.0));
    z-index: 30;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #chrome-bottom { background: linear-gradient(0deg, rgba(16,14,10,0.92), rgba(16,14,10,0.0)); }
  #app.chrome-visible #chrome-top,
  #app.chrome-visible #chrome-bottom { opacity: 1; pointer-events: auto; }
  #chrome-top { height: calc(56px + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top); justify-content: space-between; position: absolute; top: 0; left: 0; right: 0; }
  #chrome-bottom { height: calc(78px + env(safe-area-inset-bottom)); padding-bottom: calc(8px + env(safe-area-inset-bottom)); position: absolute; bottom: 0; left: 0; right: 0; flex-direction: column; gap: 6px; justify-content: center; }

  #book-title { font-family: 'Fraunces', serif; font-size: 14px; color: var(--chrome-text-dim); letter-spacing: 0.01em; max-width: 40vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .chrome-btns { display: flex; gap: 4px; align-items: center; }
  .icon-btn {
    background: transparent; border: none; color: var(--chrome-text-dim);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: background 0.15s, color 0.15s;
    touch-action: manipulation;
  }
  .icon-btn:hover { background: rgba(180,138,79,0.18); color: var(--brass-bright); }
  .icon-btn.active { color: var(--brass-bright); background: rgba(180,138,79,0.15); }
  .icon-btn svg { width: 17px; height: 17px; }

  /* ---------- Progress thread (signature element) ---------- */
  #progress-thread {
    position: relative; width: min(560px, 90%); height: 28px;
    display: flex; align-items: center;
    cursor: pointer; touch-action: manipulation;
  }
  #progress-thread::before {
    content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 3px; transform: translateY(-50%);
    background: rgba(180,138,79,0.2); border-radius: 2px;
  }
  #progress-fill { position: absolute; left:0; top: 50%; transform: translateY(-50%); height: 3px; background: linear-gradient(90deg, var(--moss), var(--brass-bright)); border-radius: 2px; width: 0%; }
  #progress-handle {
    position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    background: var(--brass-bright); transform: translate(-50%, -50%);
    box-shadow: 0 0 0 4px rgba(216,175,113,0.18);
    left: 0%;
  }
  #page-indicator { font-size: 11.5px; color: var(--chrome-text-dim); letter-spacing: 0.03em; }
  #page-indicator b { color: var(--brass-bright); font-weight: 600; }

  /* ---------- Stage ---------- */
  #book-stage { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }

  #page-viewport { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; perspective: 2400px; touch-action: pan-y manipulation; }
  #page-viewport.reflow-mode, #page-viewport.scroll-mode { display: block; align-items: unset; justify-content: unset; perspective: none; overflow: hidden; }

  .leaf-wrap {
    position: relative;
    background: var(--paper);
    box-shadow: 0 26px 60px var(--paper-shadow), 0 2px 0 rgba(0,0,0,0.15);
    border-radius: 2px;
    transition: transform 0.22s ease, opacity 0.22s ease, filter 0.22s ease;
    transform-style: preserve-3d;
  }
  .leaf-wrap::after {
    /* stacked page-edge illusion */
    content: ""; position: absolute; inset: 0; border-radius: 2px;
    box-shadow: 6px 8px 0 -4px rgba(0,0,0,0.06), 11px 15px 0 -8px rgba(0,0,0,0.05);
    pointer-events: none;
  }
  .leaf-wrap canvas { display: block; border-radius: 2px; }
  .leaf-wrap.flip-fwd-out { transform: rotateY(-12deg) translateX(-22px); opacity: 0; }
  .leaf-wrap.flip-back-out { transform: rotateY(12deg) translateX(22px); opacity: 0; }
  .leaf-wrap.flip-in { transform: rotateY(0) translateX(0); opacity: 1; }

  #spread { display: flex; align-items: stretch; gap: 0; }
  #spread .spine {
    width: 26px; flex-shrink: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.18), rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.0) 70%, rgba(0,0,0,0.18));
  }
  #spread.single-mode .leaf.right, #spread.single-mode .spine { display: none; }
  #spread .leaf.left .leaf-wrap { border-radius: 2px 0 0 2px; }
  #spread .leaf.right .leaf-wrap { border-radius: 0 2px 2px 0; }

  #scroll-container { width: min(820px, 92vw); height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 40px 0 80px; scroll-behavior: smooth; }
  #scroll-container .scroll-page { margin: 0 auto 18px; background: var(--paper); box-shadow: 0 18px 44px var(--paper-shadow); border-radius: 2px; }
  #scroll-container .scroll-page canvas { display: block; border-radius: 2px; }

  /* ---------- Reflow (true ebook text) mode ---------- */
  #reflow-container {
    width: 100%; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: var(--paper); scroll-behavior: smooth;
    padding: calc(60px + env(safe-area-inset-top)) 0 calc(110px + env(safe-area-inset-bottom));
  }
  .reflow-page {
    max-width: var(--reflow-width, 620px); margin: 0 auto; padding: 0 26px 40px;
  }
  .reflow-page p {
    font-family: 'Literata', serif; font-size: var(--reflow-font, 19px); line-height: 1.72;
    color: var(--paper-text); margin: 0 0 1.1em; text-align: left; hyphens: auto;
  }
  .reflow-page .reflow-skeleton { opacity: 0.28; font-style: italic; font-family: 'Literata', serif; font-size: var(--reflow-font, 19px); color: var(--paper-text); padding: 10px 0; }
  .reflow-page .reflow-empty { opacity: 0.5; font-style: italic; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--paper-text); }
  .reflow-divider { max-width: var(--reflow-width, 620px); margin: 0 auto; padding: 0 26px; display: flex; align-items: center; gap: 10px; opacity: 0.35; }
  .reflow-divider::before, .reflow-divider::after { content: ""; flex: 1; height: 1px; background: var(--paper-text); }
  .reflow-divider span { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.1em; color: var(--paper-text); }
  [data-theme="night"] #reflow-container { background: #15140f; }
  [data-theme="night"] .reflow-page p, [data-theme="night"] .reflow-page .reflow-skeleton { color: #cfc6b3; }
  [data-theme="night"] .reflow-divider::before, [data-theme="night"] .reflow-divider::after, [data-theme="night"] .reflow-divider span { background: #cfc6b3; color: #cfc6b3; }
  [data-theme="sepia"] #reflow-container { background: #ecdfc2; }
  [data-theme="sepia"] .reflow-page p, [data-theme="sepia"] .reflow-page .reflow-skeleton { color: #3a2c18; }
  [data-theme="sepia"] .reflow-divider::before, [data-theme="sepia"] .reflow-divider::after, [data-theme="sepia"] .reflow-divider span { background: #3a2c18; color: #3a2c18; }

  .reflow-page p.speaking {
    background: rgba(180,138,79,0.18); border-radius: 4px;
    box-shadow: 0 0 0 8px rgba(180,138,79,0.18);
    transition: background 0.25s, box-shadow 0.25s;
  }

  #listen-bar {
    position: absolute; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    background: rgba(15,13,9,0.96); border: 1px solid rgba(180,138,79,0.3);
    border-radius: 26px; padding: 5px 8px; display: flex; align-items: center; gap: 2px;
    z-index: 45; box-shadow: 0 14px 34px rgba(0,0,0,0.45);
  }
  #listen-bar[hidden] { display: none; }
  #listen-bar .icon-btn { width: 36px; height: 36px; }
  #listen-bar select {
    background: transparent; color: var(--chrome-text-dim); border: 1px solid rgba(180,138,79,0.25);
    border-radius: 14px; font-size: 11px; padding: 5px 6px; max-width: 108px; margin: 0 2px;
    font-family: 'Inter', sans-serif;
  }
  #listen-bar select option { background: #15140f; color: var(--chrome-text); }
  #listen-bar #listen-speed {
    background: transparent; border: 1px solid rgba(180,138,79,0.25); color: var(--chrome-text-dim);
    border-radius: 14px; font-size: 11.5px; padding: 6px 10px; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  #listen-bar #listen-speed:hover { color: var(--brass-bright); border-color: var(--brass); }
  @media (max-width: 420px) {
    #listen-bar select { max-width: 70px; }
  }

  [data-theme="night"] .leaf-wrap canvas, [data-theme="night"] .scroll-page canvas { filter: invert(0.93) hue-rotate(180deg) contrast(0.92); }
  [data-theme="night"] .leaf-wrap, [data-theme="night"] .scroll-page { background: #15140f; box-shadow: 0 26px 60px rgba(0,0,0,0.6); }
  [data-theme="sepia"] .leaf-wrap canvas, [data-theme="sepia"] .scroll-page canvas { filter: sepia(0.42) saturate(1.05) brightness(0.97); }
  [data-theme="sepia"] .leaf-wrap, [data-theme="sepia"] .scroll-page { background: #ecdfc2; }

  /* ---------- Drawer (TOC / Library) ---------- */
  #drawer {
    position: absolute; top: 0; bottom: 0; left: 0; width: 300px;
    background: rgba(18,15,10,0.97); border-right: 1px solid rgba(180,138,79,0.18);
    z-index: 40; transform: translateX(-100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column;
    padding: calc(60px + env(safe-area-inset-top)) 0 calc(20px + env(safe-area-inset-bottom));
    backdrop-filter: blur(6px);
  }
  #drawer.open { transform: translateX(0); }
  #drawer h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brass); margin: 0 0 10px; padding: 0 20px; }
  #drawer .drawer-section { padding-bottom: 18px; border-bottom: 1px solid rgba(180,138,79,0.12); margin-bottom: 14px; overflow-y: auto; }
  #toc-tree { padding: 0 20px; overflow-y: auto; flex: 1; }
  #toc-tree ul { list-style: none; margin: 0; padding-left: 14px; }
  #toc-tree > ul { padding-left: 0; }
  #toc-tree a { color: var(--chrome-text-dim); text-decoration: none; font-size: 13px; line-height: 2; display: block; }
  #toc-tree a:hover { color: var(--brass-bright); }
  #toc-empty { padding: 0 20px; font-size: 12px; color: var(--chrome-text-dim); }

  /* ---------- Zoom popover ---------- */
  #zoom-pop {
    position: absolute; top: 50px; right: 18px; background: rgba(18,15,10,0.97);
    border: 1px solid rgba(180,138,79,0.25); border-radius: 8px; padding: 10px;
    display: none; flex-direction: column; gap: 6px; z-index: 35; width: 168px;
  }
  #zoom-pop.open { display: flex; }
  #zoom-pop button { background: transparent; border: 1px solid rgba(180,138,79,0.25); color: var(--chrome-text-dim); padding: 7px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; text-align: left; }
  #zoom-pop button:hover { color: var(--brass-bright); border-color: var(--brass); }
  #zoom-pop .row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  #zoom-pop .row button { flex: 1; text-align: center; padding: 6px; }

  #drop-veil {
    position: fixed; inset: 0; background: rgba(180,138,79,0.08); border: 3px dashed var(--brass-bright);
    z-index: 100; display: none; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 22px; color: var(--brass-bright); pointer-events: none;
  }
  #drop-veil.show { display: flex; }

  #toast {
    position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: rgba(18,15,10,0.95); border: 1px solid rgba(180,138,79,0.3); color: var(--chrome-text);
    padding: 9px 16px; border-radius: 20px; font-size: 12.5px; z-index: 60;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(180,138,79,0.35); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--brass-bright); outline-offset: 2px; }

  @media (max-width: 720px) {
    #book-title { max-width: 36vw; font-size: 12px; }
    #drawer { width: 84vw; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="empty-state">
    <div class="clasp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M8 3v18M12 8h6M12 12h6M12 16h4"/></svg>
    </div>
    <h1>Folio</h1>
    <p>Drop a PDF here, or click to choose one. It opens like a book — paginated, themed, and remembers exactly where you left off.</p>
    <div class="hint">Click or drag a .pdf file</div>
    <div id="library-list"></div>
  </div>

  <div id="book" hidden>
    <div id="chrome-top">
      <div class="chrome-btns">
        <button class="icon-btn" id="btn-drawer" title="Contents &amp; library (T)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h10M4 18h16"/></svg>
        </button>
        <span id="book-title">—</span>
      </div>
      <div class="chrome-btns">
        <button class="icon-btn" id="btn-spread" title="Toggle two-page spread">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg>
        </button>
        <button class="icon-btn" id="btn-scroll" title="Toggle scroll mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
        </button>
        <button class="icon-btn" id="btn-reflow" title="Reflow as text (easier on phones)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 11h16M4 16h10"/></svg>
        </button>
        <button class="icon-btn" id="btn-listen" title="Listen (text-to-speech)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 14v-2a8 8 0 0116 0v2"/><rect x="2.5" y="13" width="4" height="7" rx="1.5"/><rect x="17.5" y="13" width="4" height="7" rx="1.5"/></svg>
        </button>
        <button class="icon-btn" id="btn-zoom" title="Zoom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <button class="icon-btn" id="btn-theme" title="Reading theme (D)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36A5.4 5.4 0 0112 3z"/></svg>
        </button>
        <button class="icon-btn" id="btn-fullscreen" title="Fullscreen (F)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 3H4v4M16 3h4v4M8 21H4v-4M16 21h4v-4"/></svg>
        </button>
        <button class="icon-btn" id="btn-open" title="Open another PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7l2-3h12l2 3M4 7h16v13H4V7z"/></svg>
        </button>
      </div>
    </div>

    <div id="book-stage">
      <div id="page-viewport">
        <div id="spread">
          <div class="leaf left"><div class="leaf-wrap"><canvas id="canvas-left"></canvas></div></div>
          <div class="spine"></div>
          <div class="leaf right"><div class="leaf-wrap"><canvas id="canvas-right"></canvas></div></div>
        </div>
        <div id="scroll-container" hidden></div>
        <div id="reflow-container" hidden></div>
      </div>
    </div>

    <div id="chrome-bottom">
      <div id="progress-thread">
        <div id="progress-fill"></div>
        <div id="progress-handle"></div>
      </div>
      <div id="page-indicator">Page <b id="pi-current">1</b> of <b id="pi-total">1</b> · <span id="pi-pct">0%</span> read</div>
    </div>

    <div id="listen-bar" hidden>
      <button class="icon-btn" id="listen-skip-back" title="Previous paragraph">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6L10 12l10 6V6z"/></svg>
      </button>
      <button class="icon-btn" id="listen-playpause" title="Play / Pause">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7V5z"/></svg>
      </button>
      <button class="icon-btn" id="listen-skip-fwd" title="Next paragraph">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zM4 6l10 6-10 6V6z"/></svg>
      </button>
      <select id="listen-voice" title="Voice"></select>
      <button id="listen-speed" title="Speed">1x</button>
      <button class="icon-btn" id="listen-close" title="Stop listening">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div id="zoom-pop">
      <div class="row">
        <button id="zoom-out">−</button>
        <span id="zoom-val" style="font-size:12px;color:var(--chrome-text-dim);min-width:42px;text-align:center;">100%</span>
        <button id="zoom-in">+</button>
      </div>
      <button id="zoom-fit-width">Fit width</button>
      <button id="zoom-fit-page">Fit page</button>
    </div>

    <div id="drawer">
      <div class="drawer-section" style="max-height:34%;">
        <h2>Library</h2>
        <div id="library-list-drawer" style="padding:0 20px; display:flex; flex-direction:column; gap:4px;"></div>
      </div>
      <h2 style="padding:0 20px;">Contents</h2>
      <div id="toc-tree"></div>
    </div>
  </div>

  <input type="file" id="file-input" accept="application/pdf" hidden />
  <div id="drop-veil">Drop to open</div>
  <div id="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const els = {
  app: document.getElementById('app'),
  emptyState: document.getElementById('empty-state'),
  libList: document.getElementById('library-list'),
  libListDrawer: document.getElementById('library-list-drawer'),
  book: document.getElementById('book'),
  fileInput: document.getElementById('file-input'),
  dropVeil: document.getElementById('drop-veil'),
  toast: document.getElementById('toast'),
  bookTitle: document.getElementById('book-title'),
  spread: document.getElementById('spread'),
  canvasLeft: document.getElementById('canvas-left'),
  canvasRight: document.getElementById('canvas-right'),
  leafLeft: document.querySelector('#spread .leaf.left .leaf-wrap'),
  leafRight: document.querySelector('#spread .leaf.right .leaf-wrap'),
  scrollContainer: document.getElementById('scroll-container'),
  reflowContainer: document.getElementById('reflow-container'),
  progressThread: document.getElementById('progress-thread'),
  progressFill: document.getElementById('progress-fill'),
  progressHandle: document.getElementById('progress-handle'),
  piCurrent: document.getElementById('pi-current'),
  piTotal: document.getElementById('pi-total'),
  piPct: document.getElementById('pi-pct'),
  drawer: document.getElementById('drawer'),
  tocTree: document.getElementById('toc-tree'),
  zoomPop: document.getElementById('zoom-pop'),
  zoomVal: document.getElementById('zoom-val'),
  btnDrawer: document.getElementById('btn-drawer'),
  btnSpread: document.getElementById('btn-spread'),
  btnScroll: document.getElementById('btn-scroll'),
  btnReflow: document.getElementById('btn-reflow'),
  btnListen: document.getElementById('btn-listen'),
  listenBar: document.getElementById('listen-bar'),
  btnZoom: document.getElementById('btn-zoom'),
  btnTheme: document.getElementById('btn-theme'),
  btnFullscreen: document.getElementById('btn-fullscreen'),
  btnOpen: document.getElementById('btn-open'),
};

let state = {
  pdfDoc: null,
  bookId: null,
  fileName: '',
  totalPages: 1,
  currentPage: 1,
  scale: 1,
  zoomMode: 'fit-width', // fit-width | fit-page | custom
  mode: 'page',          // page | scroll | reflow
  spreadOn: true,
  reflowFontSize: 19,
  reflowWidth: 620,
  listening: false,
  speechRate: parseFloat(localStorage.getItem('folio:speechRate')) || 1,
  theme: 'day',           // day | sepia | night
  rendering: false,
};

const THEMES = ['day', 'sepia', 'night'];

// ---------------- Storage helpers ----------------
function hashId(name, size) {
  let h = 0;
  const str = name + ':' + size;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return 'b' + Math.abs(h);
}
async function loadLibrary() {
  try {
    const v = localStorage.getItem('folio:library');
    return v ? JSON.parse(v) : [];
  } catch (e) { return []; }
}
async function saveLibrary(list) {
  try { localStorage.setItem('folio:library', JSON.stringify(list.slice(0, 12))); } catch (e) {}
}
async function upsertLibraryEntry(entry) {
  const list = await loadLibrary();
  const idx = list.findIndex(b => b.id === entry.id);
  if (idx >= 0) list[idx] = { ...list[idx], ...entry };
  else list.unshift(entry);
  list.sort((a, b) => b.lastOpened - a.lastOpened);
  await saveLibrary(list);
  return list;
}
async function saveProgress() {
  if (!state.bookId) return;
  try {
    localStorage.setItem('folio:book:' + state.bookId, JSON.stringify({
      page: state.currentPage, theme: state.theme, mode: state.mode, spreadOn: state.spreadOn,
      zoomMode: state.zoomMode, reflowFontSize: state.reflowFontSize, reflowWidth: state.reflowWidth
    }));
  } catch (e) {}
  await upsertLibraryEntry({
    id: state.bookId, name: state.fileName, totalPages: state.totalPages,
    lastPage: state.currentPage, lastOpened: Date.now()
  });
}
async function loadProgress(id) {
  try {
    const v = localStorage.getItem('folio:book:' + id);
    return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}

function showToast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => els.toast.classList.remove('show'), 2200);
}

// ---------------- Library UI (empty state) ----------------
async function renderLibraryLists() {
  const list = await loadLibrary();
  const build = (container, withReopen) => {
    container.innerHTML = '';
    if (!list.length) {
      if (container === els.libListDrawer) container.innerHTML = '<div style="font-size:12px;color:var(--chrome-text-dim);">No books yet.</div>';
      return;
    }
    list.forEach(b => {
      const btn = document.createElement('button');
      const pct = Math.round((b.lastPage / Math.max(b.totalPages,1)) * 100);
      btn.innerHTML = `<span>${escapeHtml(b.name)}</span><span class="pct">${pct}%</span>`;
      btn.onclick = () => { pendingReopenId = b.id; els.fileInput.click(); };
      container.appendChild(btn);
    });
  };
  build(els.libList);
  build(els.libListDrawer);
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let pendingReopenId = null;

// ---------------- File opening ----------------
els.emptyState.addEventListener('click', () => { pendingReopenId = null; els.fileInput.click(); });
els.btnOpen.addEventListener('click', () => { pendingReopenId = null; els.fileInput.click(); });
els.fileInput.addEventListener('change', (e) => { if (e.target.files[0]) openFile(e.target.files[0]); });

['dragenter','dragover'].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault();
  if ([...e.dataTransfer.items].some(i => i.type === 'application/pdf')) els.dropVeil.classList.add('show');
}));
['dragleave','drop'].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault();
  els.dropVeil.classList.remove('show');
}));
document.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') { pendingReopenId = null; openFile(f); }
});

async function openFile(file) {
  if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
    showToast('That doesn\'t look like a PDF.'); return;
  }
  const id = hashId(file.name, file.size);
  if (pendingReopenId && pendingReopenId !== id) {
    showToast('Different file selected — opening it fresh.');
  }
  const buf = await file.arrayBuffer();
  try {
    const loadingTask = pdfjsLib.getDocument({ data: buf });
    const pdfDoc = await loadingTask.promise;
    state.pdfDoc = pdfDoc;
    state.bookId = id;
    state.fileName = file.name.replace(/\.pdf$/i, '');
    state.totalPages = pdfDoc.numPages;
    state.currentPage = 1;
    state.scale = 1;
    state.zoomMode = 'fit-width';
    state.theme = 'day';
    state.mode = window.innerWidth < 700 ? 'reflow' : 'page';
    state.spreadOn = window.innerWidth > 900;
    state.reflowFontSize = 19;
    state.reflowWidth = window.innerWidth < 700 ? Math.min(window.innerWidth - 40, 620) : 620;

    const saved = await loadProgress(id);
    if (saved) {
      state.currentPage = Math.min(saved.page || 1, state.totalPages);
      state.theme = saved.theme || 'day';
      state.mode = saved.mode || state.mode;
      state.spreadOn = saved.spreadOn ?? state.spreadOn;
      state.zoomMode = saved.zoomMode || 'fit-width';
      state.reflowFontSize = saved.reflowFontSize || state.reflowFontSize;
      state.reflowWidth = saved.reflowWidth || state.reflowWidth;
    }

    els.emptyState.style.display = 'none';
    els.book.hidden = false;
    els.bookTitle.textContent = state.fileName;
    document.documentElement.setAttribute('data-theme', state.theme);
    applyReflowStyleVars();
    applyModeUI();
    await buildToc();
    await renderCurrent();
    await upsertLibraryEntry({ id, name: state.fileName, totalPages: state.totalPages, lastPage: state.currentPage, lastOpened: Date.now() });
    revealChromeBriefly();
    showToast(saved ? 'Welcome back — resumed where you left off.' : 'Opened ' + state.fileName);
  } catch (err) {
    console.error(err);
    showToast('Could not open that PDF.');
  }
  els.fileInput.value = '';
}

// ---------------- Rendering ----------------
async function getFitScale(pageNum, mode) {
  const page = await state.pdfDoc.getPage(pageNum);
  const base = page.getViewport({ scale: 1 });
  const vp = document.getElementById('page-viewport');
  const availH = Math.max(vp.clientHeight || window.innerHeight, 400) - 24;
  const availW = state.spreadOn && state.mode === 'page'
    ? (Math.max(vp.clientWidth || window.innerWidth, 300) - 26) / 2 - 24
    : Math.min(Math.max(vp.clientWidth || window.innerWidth, 300) - 40, 760);
  if (mode === 'fit-page') return Math.min(availW / base.width, availH / base.height);
  return availW / base.width;
}

async function renderToCanvas(canvas, pageNum, scaleOverride) {
  const page = await state.pdfDoc.getPage(pageNum);
  const scale = scaleOverride || await getFitScale(pageNum, state.zoomMode === 'custom' ? null : state.zoomMode) * (state.zoomMode === 'custom' ? state.scale : 1);
  const finalScale = state.zoomMode === 'custom' ? (await getFitScale(pageNum, 'fit-width')) * state.scale : scale;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const viewport = page.getViewport({ scale: finalScale * dpr });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / dpr) + 'px';
  canvas.style.height = (viewport.height / dpr) + 'px';
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
}

async function renderCurrent() {
  if (!state.pdfDoc || state.rendering) return;
  state.rendering = true;
  if (state.mode === 'page') {
    els.spread.classList.toggle('single-mode', !state.spreadOn);
    await renderToCanvas(els.canvasLeft, state.currentPage);
    if (state.spreadOn && state.currentPage + 1 <= state.totalPages) {
      els.leafRight.style.visibility = 'visible';
      await renderToCanvas(els.canvasRight, state.currentPage + 1);
    } else if (state.spreadOn) {
      els.leafRight.style.visibility = 'hidden';
    }
  } else if (state.mode === 'reflow') {
    await renderReflowMode();
  } else {
    await renderScrollMode();
  }
  updateProgressUI();
  state.rendering = false;
}

function applyReflowStyleVars() {
  els.reflowContainer.style.setProperty('--reflow-font', state.reflowFontSize + 'px');
  els.reflowContainer.style.setProperty('--reflow-width', state.reflowWidth + 'px');
}

async function extractParagraphs(pageNum) {
  try {
    const page = await state.pdfDoc.getPage(pageNum);
    const content = await page.getTextContent();
    const items = content.items.filter(it => it.str && it.str.length);
    if (!items.length) return [];
    const lines = [];
    let cur = null;
    for (const it of items) {
      const y = Math.round(it.transform[5]);
      if (!cur || Math.abs(cur.y - y) > 2.5) {
        cur = { y, x: it.transform[4], text: it.str };
        lines.push(cur);
      } else {
        cur.text += it.str;
      }
    }
    lines.sort((a, b) => b.y - a.y);
    const gaps = [];
    for (let i = 1; i < lines.length; i++) gaps.push(lines[i - 1].y - lines[i].y);
    const sorted = [...gaps].filter(g => g > 0).sort((a, b) => a - b);
    const medianGap = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 14;
    const baseX = lines.length ? lines[0].x : 0;
    const paras = [];
    let buf = '';
    for (let i = 0; i < lines.length; i++) {
      const t = lines[i].text.replace(/\s+/g, ' ').trim();
      if (!t) continue;
      if (i > 0 && buf) {
        const gap = lines[i - 1].y - lines[i].y;
        const indented = lines[i].x - baseX > 9;
        const endsSentence = /[.!?]["')\u201d]?$/.test(buf.trim());
        if (gap > medianGap * 1.55 || (indented && endsSentence)) {
          paras.push(buf.trim());
          buf = '';
        }
      }
      if (/[a-z]-$/.test(buf) && /^[a-z]/.test(t)) {
        buf = buf.slice(0, -1) + t;
      } else {
        buf += (buf ? ' ' : '') + t;
      }
    }
    if (buf.trim()) paras.push(buf.trim());
    return paras;
  } catch (e) { return []; }
}

async function renderScrollMode() {
  if (els.scrollContainer.dataset.built === String(state.bookId)) return;
  els.scrollContainer.innerHTML = '';
  els.scrollContainer.dataset.built = String(state.bookId);
  const vw = els.scrollContainer.clientWidth - 40;
  for (let i = 1; i <= state.totalPages; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'scroll-page';
    wrap.dataset.page = i;
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    els.scrollContainer.appendChild(wrap);
  }
  const observer = new IntersectionObserver(entries => {
    entries.forEach(en => {
      const p = Number(en.target.dataset.page);
      if (en.isIntersecting) {
        if (!en.target.dataset.rendered) {
          state.pdfDoc.getPage(p).then(page => {
            const base = page.getViewport({ scale: 1 });
            const scale = (vw / base.width) * (state.zoomMode === 'custom' ? state.scale : 1);
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const viewport = page.getViewport({ scale: scale * dpr });
            const canvas = en.target.querySelector('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            canvas.style.width = (viewport.width / dpr) + 'px';
            canvas.style.height = (viewport.height / dpr) + 'px';
            page.render({ canvasContext: canvas.getContext('2d'), viewport });
            en.target.dataset.rendered = '1';
          });
        }
        state.currentPage = p;
        updateProgressUI();
      }
    });
  }, { root: els.scrollContainer, threshold: 0.5 });
  [...els.scrollContainer.children].forEach(c => observer.observe(c));

  const targetPage = els.scrollContainer.children[state.currentPage - 1];
  if (targetPage) targetPage.scrollIntoView();
}

async function renderReflowMode() {
  applyReflowStyleVars();
  if (els.reflowContainer.dataset.built === String(state.bookId)) {
    const target = els.reflowContainer.children[state.currentPage - 1];
    if (target) target.scrollIntoView();
    return;
  }
  els.reflowContainer.innerHTML = '';
  els.reflowContainer.dataset.built = String(state.bookId);

  for (let i = 1; i <= state.totalPages; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'reflow-page';
    wrap.dataset.page = i;
    wrap.innerHTML = '<p class="reflow-skeleton" style="opacity:0.4;font-style:italic;">Loading page ' + i + '…</p>';
    els.reflowContainer.appendChild(wrap);
  }

  // Scroll to saved page first, then start observing
  const startTarget = els.reflowContainer.children[state.currentPage - 1];
  if (startTarget) startTarget.scrollIntoView();

  // Use reflowContainer as root for accurate iOS scroll detection
  const observer = new IntersectionObserver(entries => {
    entries.forEach(en => {
      const p = Number(en.target.dataset.page);
      if (en.isIntersecting && !en.target.dataset.rendered) {
        en.target.dataset.rendered = '1';
        extractParagraphs(p).then(paras => {
          en.target.innerHTML = paras.length
            ? paras.map(t => `<p>${escapeHtml(t)}</p>`).join('')
            : '<p class="reflow-empty">No selectable text on this page — switch to Page view to see it as an image.</p>';
        });
        state.currentPage = p;
        updateProgressUI();
      }
    });
  }, { root: els.reflowContainer, rootMargin: '200px', threshold: 0.1 });

  [...els.reflowContainer.children].forEach(c => observer.observe(c));
}

// ---------------- Listen (text-to-speech) ----------------
let synthVoices = [];
let currentUtterance = null;
let listenPageParas = [];
let listenParaIdx = 0;
let listenPageNum = null;
const SPEEDS = [0.75, 1, 1.25, 1.5, 1.75, 2];

function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  synthVoices = window.speechSynthesis.getVoices();
  const sel = document.getElementById('listen-voice');
  if (!sel || !synthVoices.length) return;
  const prevValue = sel.value;
  sel.innerHTML = '';
  const sorted = [...synthVoices].sort((a, b) => (b.lang.startsWith('en') - a.lang.startsWith('en')) || a.name.localeCompare(b.name));
  sorted.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.voiceURI;
    opt.textContent = v.name.replace(/^Microsoft |^Google /, '') + ' · ' + v.lang;
    sel.appendChild(opt);
  });
  const saved = localStorage.getItem('folio:voiceURI');
  if (saved && sorted.some(v => v.voiceURI === saved)) sel.value = saved;
  else if (prevValue && sorted.some(v => v.voiceURI === prevValue)) sel.value = prevValue;
}
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

async function ensureReflowPageRendered(pageNum) {
  if (els.reflowContainer.dataset.built !== String(state.bookId)) await renderReflowMode();
  const wrap = els.reflowContainer.children[pageNum - 1];
  if (!wrap) return null;
  if (!wrap.dataset.rendered) {
    wrap.dataset.rendered = '1';
    const paras = await extractParagraphs(pageNum);
    wrap.innerHTML = paras.length
      ? paras.map(t => `<p>${escapeHtml(t)}</p>`).join('')
      : '<p class="reflow-empty">No selectable text on this page.</p>';
  }
  return wrap;
}

function updateListenPlayIcon() {
  const btn = document.getElementById('listen-playpause');
  if (!btn) return;
  const playing = state.listening && !window.speechSynthesis.paused && window.speechSynthesis.speaking;
  btn.innerHTML = playing
    ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7V5z"/></svg>';
}

function stopListening() {
  const wasListening = state.listening;
  state.listening = false;
  if (currentUtterance) { currentUtterance.onend = null; currentUtterance.onerror = null; currentUtterance = null; }
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.reflow-page p.speaking').forEach(p => p.classList.remove('speaking'));
  if (els.listenBar) els.listenBar.hidden = true;
  if (els.btnListen) els.btnListen.classList.remove('active');
  if (wasListening) updateListenPlayIcon();
}

function speakParagraph() {
  if (!state.listening) return;
  if (listenParaIdx >= listenPageParas.length) {
    if (listenPageNum < state.totalPages) {
      goToPage(listenPageNum + 1, false);
      speakPage(listenPageNum + 1, 0);
    } else {
      showToast('Finished the book.');
      stopListening();
    }
    return;
  }
  document.querySelectorAll('.reflow-page p.speaking').forEach(p => p.classList.remove('speaking'));
  const p = listenPageParas[listenParaIdx];
  p.classList.add('speaking');
  p.scrollIntoView({ behavior: 'smooth', block: 'center' });
  const utter = new SpeechSynthesisUtterance(p.textContent);
  utter.rate = state.speechRate;
  const sel = document.getElementById('listen-voice');
  if (sel && sel.value) {
    const v = synthVoices.find(v => v.voiceURI === sel.value);
    if (v) utter.voice = v;
  }
  utter.onend = () => { if (!state.listening) return; listenParaIdx++; speakParagraph(); };
  utter.onerror = () => { if (!state.listening) return; listenParaIdx++; speakParagraph(); };
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
  updateListenPlayIcon();
}

async function speakPage(pageNum, startIdx) {
  const wrap = await ensureReflowPageRendered(pageNum);
  if (!wrap || !state.listening) return;
  const paras = [...wrap.querySelectorAll('p')].filter(p => !p.classList.contains('reflow-empty'));
  listenPageParas = paras; listenPageNum = pageNum; listenParaIdx = startIdx || 0;
  if (!paras.length) {
    if (pageNum < state.totalPages && state.listening) { goToPage(pageNum + 1, false); speakPage(pageNum + 1, 0); }
    else stopListening();
    return;
  }
  speakParagraph();
}

async function startListening() {
  if (!('speechSynthesis' in window)) { showToast('Text-to-speech isn\'t supported in this browser.'); return; }
  if (state.mode !== 'reflow') { state.mode = 'reflow'; applyModeUI(); }
  els.listenBar.hidden = false;
  els.btnListen.classList.add('active');
  state.listening = true;
  await speakPage(state.currentPage, 0);
}

function togglePlayPause() {
  if (!state.listening) { startListening(); return; }
  if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) window.speechSynthesis.pause();
  else if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  setTimeout(updateListenPlayIcon, 60);
}

function skipParagraph(delta) {
  if (!state.listening) return;
  if (currentUtterance) { currentUtterance.onend = null; currentUtterance.onerror = null; }
  window.speechSynthesis.cancel();
  listenParaIdx = Math.max(0, listenParaIdx + delta);
  speakParagraph();
}

els.btnListen.addEventListener('click', () => { state.listening ? stopListening() : startListening(); });
document.getElementById('listen-playpause').addEventListener('click', togglePlayPause);
document.getElementById('listen-skip-back').addEventListener('click', () => skipParagraph(-1));
document.getElementById('listen-skip-fwd').addEventListener('click', () => skipParagraph(1));
document.getElementById('listen-close').addEventListener('click', stopListening);
document.getElementById('listen-voice').addEventListener('change', (e) => localStorage.setItem('folio:voiceURI', e.target.value));
document.getElementById('listen-speed').addEventListener('click', () => {
  const idx = (SPEEDS.indexOf(state.speechRate) + 1) % SPEEDS.length;
  state.speechRate = SPEEDS[idx];
  document.getElementById('listen-speed').textContent = state.speechRate + 'x';
  localStorage.setItem('folio:speechRate', state.speechRate);
});
document.getElementById('listen-speed').textContent = state.speechRate + 'x';

function updateProgressUI() {
  els.piCurrent.textContent = state.currentPage;
  els.piTotal.textContent = state.totalPages;
  const pct = Math.round((state.currentPage / state.totalPages) * 100);
  els.piPct.textContent = pct + '%';
  els.progressFill.style.width = pct + '%';
  els.progressHandle.style.left = pct + '%';
  saveProgress();
}

// ---------------- Navigation with page-turn animation ----------------
async function goToPage(num, animate) {
  if (!state.pdfDoc) return;
  num = Math.max(1, Math.min(num, state.totalPages));
  if (num === state.currentPage && !animate) return;
  const forward = num > state.currentPage;
  state.currentPage = num;

  if (state.mode === 'scroll' || state.mode === 'reflow') {
    const container = state.mode === 'scroll' ? els.scrollContainer : els.reflowContainer;
    const target = container.children[num - 1];
    if (target) target.scrollIntoView({ behavior: 'smooth' });
    updateProgressUI();
    return;
  }

  if (animate) {
    els.leafLeft.classList.add(forward ? 'flip-fwd-out' : 'flip-back-out');
    if (state.spreadOn) els.leafRight.classList.add(forward ? 'flip-fwd-out' : 'flip-back-out');
    await new Promise(r => setTimeout(r, 170));
  }
  await renderCurrent();
  if (animate) {
    requestAnimationFrame(() => {
      els.leafLeft.classList.remove('flip-fwd-out', 'flip-back-out');
      els.leafRight.classList.remove('flip-fwd-out', 'flip-back-out');
      els.leafLeft.classList.add('flip-in');
      els.leafRight.classList.add('flip-in');
      setTimeout(() => { els.leafLeft.classList.remove('flip-in'); els.leafRight.classList.remove('flip-in'); }, 230);
    });
  }
}
function nextPage() { goToPage(state.currentPage + (state.spreadOn && state.mode === 'page' ? 2 : 1), true); }
function prevPage() { goToPage(state.currentPage - (state.spreadOn && state.mode === 'page' ? 2 : 1), true); }

// ---------------- TOC ----------------
async function buildToc() {
  els.tocTree.innerHTML = '';
  try {
    const outline = await state.pdfDoc.getOutline();
    if (!outline || !outline.length) {
      els.tocTree.innerHTML = '<div id="toc-empty">This PDF has no table of contents.</div>';
      return;
    }
    const root = await renderOutlineLevel(outline);
    els.tocTree.appendChild(root);
  } catch (e) {
    els.tocTree.innerHTML = '<div id="toc-empty">Contents unavailable.</div>';
  }
}
async function renderOutlineLevel(items) {
  const ul = document.createElement('ul');
  for (const item of items) {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = item.title;
    a.onclick = async (e) => {
      e.preventDefault();
      try {
        let dest = item.dest;
        if (typeof dest === 'string') dest = await state.pdfDoc.getDestination(dest);
        if (dest) {
          const pageIndex = await state.pdfDoc.getPageIndex(dest[0]);
          goToPage(pageIndex + 1, true);
          els.drawer.classList.remove('open');
        }
      } catch (err) {}
    };
    li.appendChild(a);
    if (item.items && item.items.length) li.appendChild(await renderOutlineLevel(item.items));
    ul.appendChild(li);
  }
  return ul;
}

// ---------------- Mode / theme / zoom controls ----------------
function applyModeUI() {
  const vp = document.getElementById('page-viewport');
  vp.classList.toggle('reflow-mode', state.mode === 'reflow');
  vp.classList.toggle('scroll-mode', state.mode === 'scroll');
  els.btnSpread.classList.toggle('active', state.spreadOn && state.mode === 'page');
  els.btnScroll.classList.toggle('active', state.mode === 'scroll');
  els.btnReflow.classList.toggle('active', state.mode === 'reflow');
  document.getElementById('spread').hidden = state.mode !== 'page';
  els.scrollContainer.hidden = state.mode !== 'scroll';
  els.reflowContainer.hidden = state.mode !== 'reflow';
  // force single-page on narrow screens
  if (window.innerWidth < 700 && state.mode === 'page') {
    state.spreadOn = false;
    els.spread.classList.add('single-mode');
  }
  stopListening();
}

els.btnSpread.addEventListener('click', () => {
  if (state.mode !== 'page') { state.mode = 'page'; }
  state.spreadOn = !state.spreadOn;
  applyModeUI(); renderCurrent();
});
els.btnScroll.addEventListener('click', () => {
  state.mode = state.mode === 'scroll' ? 'page' : 'scroll';
  applyModeUI();
  if (state.mode === 'scroll') { els.scrollContainer.dataset.built = ''; renderScrollMode(); }
  else renderCurrent();
  saveProgress();
});
els.btnReflow.addEventListener('click', () => {
  state.mode = state.mode === 'reflow' ? 'page' : 'reflow';
  applyModeUI();
  if (state.mode === 'reflow') { els.reflowContainer.dataset.built = ''; renderReflowMode(); }
  else renderCurrent();
  saveProgress();
});
els.btnTheme.addEventListener('click', () => {
  const i = (THEMES.indexOf(state.theme) + 1) % THEMES.length;
  state.theme = THEMES[i];
  document.documentElement.setAttribute('data-theme', state.theme);
  showToast('Theme: ' + state.theme[0].toUpperCase() + state.theme.slice(1));
  saveProgress();
});
const isIOS = /iP(hone|ad|od)/.test(navigator.platform) || (navigator.userAgent.includes('Mac') && 'ontouchend' in document);
const isStandalone = window.navigator.standalone === true;
if (isIOS && !document.fullscreenEnabled) {
  els.btnFullscreen.title = isStandalone ? 'Already full screen' : 'Add to Home Screen for full screen';
  els.btnFullscreen.addEventListener('click', () => {
    if (isStandalone) return;
    showToast('Tap Share → Add to Home Screen for an edge-to-edge view');
  });
} else {
  els.btnFullscreen.addEventListener('click', () => {
    if (!document.fullscreenElement) els.app.requestFullscreen?.();
    else document.exitFullscreen?.();
  });
}
els.btnDrawer.addEventListener('click', async () => { els.drawer.classList.toggle('open'); await renderLibraryLists(); });
document.addEventListener('click', (e) => {
  if (els.drawer.classList.contains('open') && !els.drawer.contains(e.target) && e.target !== els.btnDrawer && !els.btnDrawer.contains(e.target)) {
    els.drawer.classList.remove('open');
  }
  if (els.zoomPop.classList.contains('open') && !els.zoomPop.contains(e.target) && e.target !== els.btnZoom && !els.btnZoom.contains(e.target)) {
    els.zoomPop.classList.remove('open');
  }
});
els.btnZoom.addEventListener('click', () => { els.zoomPop.classList.toggle('open'); updateZoomPopLabels(); });
function updateZoomPopLabels() {
  const reflow = state.mode === 'reflow';
  document.getElementById('zoom-fit-width').textContent = reflow ? 'Narrow column' : 'Fit width';
  document.getElementById('zoom-fit-page').textContent = reflow ? 'Wide column' : 'Fit page';
  els.zoomVal.textContent = reflow ? (state.reflowFontSize + 'px') : (state.zoomMode === 'custom' ? Math.round((state.scale || 1) * 100) + '%' : '100%');
}
document.getElementById('zoom-in').addEventListener('click', () => {
  if (state.mode === 'reflow') { state.reflowFontSize = Math.min(state.reflowFontSize + 1, 28); applyReflowStyleVars(); saveProgress(); }
  else { state.zoomMode = 'custom'; state.scale = Math.min((state.scale||1) + 0.1, 3); renderCurrent(); }
  updateZoomPopLabels();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  if (state.mode === 'reflow') { state.reflowFontSize = Math.max(state.reflowFontSize - 1, 14); applyReflowStyleVars(); saveProgress(); }
  else { state.zoomMode = 'custom'; state.scale = Math.max((state.scale||1) - 0.1, 0.4); renderCurrent(); }
  updateZoomPopLabels();
});
document.getElementById('zoom-fit-width').addEventListener('click', () => {
  if (state.mode === 'reflow') { state.reflowWidth = 480; applyReflowStyleVars(); saveProgress(); }
  else { state.zoomMode = 'fit-width'; state.scale = 1; renderCurrent(); }
  updateZoomPopLabels();
});
document.getElementById('zoom-fit-page').addEventListener('click', () => {
  if (state.mode === 'reflow') { state.reflowWidth = 760; applyReflowStyleVars(); saveProgress(); }
  else { state.zoomMode = 'fit-page'; state.scale = 1; renderCurrent(); }
  updateZoomPopLabels();
});

// ---------------- Progress thread interaction ----------------
els.progressThread.addEventListener('click', (e) => {
  const rect = els.progressThread.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  goToPage(Math.round(pct * state.totalPages), true);
});

// ---------------- Page-turn click zones + swipe ----------------
document.getElementById('page-viewport').addEventListener('click', (e) => {
  if (state.mode !== 'page') return;
  if (suppressNextClick) { suppressNextClick = false; return; }
  const w = window.innerWidth;
  if (e.clientX < w * 0.25) prevPage();
  else if (e.clientX > w * 0.75) nextPage();
});
let touchStartX = null, touchStartY = null, suppressNextClick = false;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5 && state.mode === 'page') {
    suppressNextClick = true;
    dx < 0 ? nextPage() : prevPage();
  }
  touchStartX = null; touchStartY = null;
});

// ---------------- Keyboard ----------------
document.addEventListener('keydown', (e) => {
  if (!state.pdfDoc) return;
  switch (e.key) {
    case 'ArrowRight': case 'PageDown': nextPage(); e.preventDefault(); break;
    case ' ': if (state.listening) togglePlayPause(); else nextPage(); e.preventDefault(); break;
    case 'ArrowLeft': case 'PageUp': prevPage(); e.preventDefault(); break;
    case 'Home': goToPage(1, true); break;
    case 'End': goToPage(state.totalPages, true); break;
    case 't': case 'T': els.btnDrawer.click(); break;
    case 'd': case 'D': els.btnTheme.click(); break;
    case 'f': case 'F': els.btnFullscreen.click(); break;
    case 'Escape': els.drawer.classList.remove('open'); els.zoomPop.classList.remove('open'); break;
  }
});

// ---------------- Chrome auto-hide ----------------
let chromeTimer = null;
function revealChromeBriefly() {
  els.app.classList.add('chrome-visible');
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(() => { if (!els.drawer.classList.contains('open')) els.app.classList.remove('chrome-visible'); }, 2600);
}
document.addEventListener('mousemove', () => { if (state.pdfDoc) revealChromeBriefly(); });
document.addEventListener('touchstart', () => { if (state.pdfDoc) revealChromeBriefly(); }, { passive: true });

// ---------------- Resize ----------------
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!state.pdfDoc) return;
    if (state.mode === 'page') { state.spreadOn = window.innerWidth > 900 ? state.spreadOn : false; renderCurrent(); }
  }, 200);
});

// ---------------- Init ----------------
renderLibraryLists();

// ---------------- Service Worker (offline) ----------------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('Folio SW registered, scope:', reg.scope);
    }).catch(err => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
