<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folio — a reading room for PDFs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #18160f;
    --leather: #2c2117;
    --leather-2: #1f1810;
    --brass: #b48a4f;
    --brass-bright: #d8af71;
    --moss: #5a6b4f;
    --paper: #f4eddc;
    --paper-text: #2a2114;
    --paper-shadow: rgba(20, 14, 4, 0.35);
    --chrome-text: #ece3cf;
    --chrome-text-dim: rgba(236, 227, 207, 0.55);
    --r: 3px;
    --page-filter: none;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    overflow: hidden;
  }
  #app {
    position: relative;
    width: 100%; height: 100vh;
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, #2a2419 0%, transparent 60%),
      linear-gradient(180deg, #100e0a 0%, #18160f 50%, #0e0c08 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--chrome-text);
  }

  /* ---------- Empty state (closed book) ---------- */
  #empty-state {
    width: min(440px, 86vw);
    aspect-ratio: 3 / 4;
    background: linear-gradient(135deg, var(--leather) 0%, var(--leather-2) 100%);
    border-radius: 6px 10px 10px 6px;
    box-shadow:
      0 30px 70px rgba(0,0,0,0.55),
      inset 0 0 0 1px rgba(180,138,79,0.25),
      inset -10px 0 18px rgba(0,0,0,0.4);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    cursor: pointer;
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  #empty-state::before {
    content: "";
    position: absolute; left: 22px; top: 18px; bottom: 18px; width: 1px;
    background: linear-gradient(180deg, transparent, var(--brass), transparent);
    opacity: 0.5;
  }
  #empty-state:hover { transform: translateY(-4px); box-shadow: 0 38px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(216,175,113,0.4); }
  #empty-state.drag-over { outline: 2px dashed var(--brass-bright); outline-offset: -14px; }
  #empty-state .clasp {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid var(--brass);
    display: flex; align-items: center; justify-content: center;
    color: var(--brass-bright);
  }
  #empty-state h1 {
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 26px;
    margin: 0; letter-spacing: 0.01em; color: var(--chrome-text);
  }
  #empty-state p { margin: 0; font-size: 13px; color: var(--chrome-text-dim); text-align: center; max-width: 260px; line-height: 1.5; }
  #empty-state .hint { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brass); margin-top: 4px; }

  #library-list {
    margin-top: 6px; width: 100%; max-width: 280px; max-height: 110px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px; padding: 0 8px;
  }
  #library-list button {
    background: rgba(180,138,79,0.08); border: 1px solid rgba(180,138,79,0.25);
    color: var(--chrome-text-dim); font-size: 11.5px; text-align: left;
    padding: 6px 10px; border-radius: var(--r); cursor: pointer; font-family: 'Inter', sans-serif;
    display: flex; justify-content: space-between; gap: 8px;
  }
  #library-list button:hover { background: rgba(180,138,79,0.18); color: var(--chrome-text); }
  #library-list button span.pct { color: var(--brass-bright); flex-shrink: 0; }

  /* ---------- Book shell ---------- */
  #book {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
  }
  #book[hidden] { display: none; }

  #chrome-top, #chrome-bottom {
    flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 18px;
    background: linear-gradient(180deg, rgba(16,14,10,0.92), rgba(16,14,10,0.0));
    z-index: 30;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #chrome-bottom { background: linear-gradient(0deg, rgba(16,14,10,0.92), rgba(16,14,10,0.0)); }
  #app.chrome-visible #chrome-top,
  #app.chrome-visible #chrome-bottom { opacity: 1; pointer-events: auto; }
  #chrome-top { height: 56px; justify-content: space-between; position: absolute; top: 0; left: 0; right: 0; }
  #chrome-bottom { height: 78px; position: absolute; bottom: 0; left: 0; right: 0; flex-direction: column; gap: 6px; justify-content: center; }

  #book-title { font-family: 'Fraunces', serif; font-size: 14px; color: var(--chrome-text-dim); letter-spacing: 0.01em; max-width: 40vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .chrome-btns { display: flex; gap: 4px; align-items: center; }
  .icon-btn {
    background: transparent; border: none; color: var(--chrome-text-dim);
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: rgba(180,138,79,0.18); color: var(--brass-bright); }
  .icon-btn.active { color: var(--brass-bright); background: rgba(180,138,79,0.15); }
  .icon-btn svg { width: 17px; height: 17px; }

  /* ---------- Progress thread (signature element) ---------- */
  #progress-thread {
    position: relative; width: min(560px, 90%); height: 3px;
    background: rgba(180,138,79,0.2); border-radius: 2px; cursor: pointer;
  }
  #progress-fill { position: absolute; left:0; top:0; bottom:0; background: linear-gradient(90deg, var(--moss), var(--brass-bright)); border-radius: 2px; width: 0%; }
  #progress-handle {
    position: absolute; top: 50%; width: 11px; height: 11px; border-radius: 50%;
    background: var(--brass-bright); transform: translate(-50%, -50%);
    box-shadow: 0 0 0 4px rgba(216,175,113,0.18);
    left: 0%;
  }
  #page-indicator { font-size: 11.5px; color: var(--chrome-text-dim); letter-spacing: 0.03em; }
  #page-indicator b { color: var(--brass-bright); font-weight: 600; }

  /* ---------- Stage ---------- */
  #book-stage { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }

  #page-viewport { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; perspective: 2400px; }

  .leaf-wrap {
    position: relative;
    background: var(--paper);
    box-shadow: 0 26px 60px var(--paper-shadow), 0 2px 0 rgba(0,0,0,0.15);
    border-radius: 2px;
    transition: transform 0.22s ease, opacity 0.22s ease, filter 0.22s ease;
    transform-style: preserve-3d;
  }
  .leaf-wrap::after {
    /* stacked page-edge illusion */
    content: ""; position: absolute; inset: 0; border-radius: 2px;
    box-shadow: 6px 8px 0 -4px rgba(0,0,0,0.06), 11px 15px 0 -8px rgba(0,0,0,0.05);
    pointer-events: none;
  }
  .leaf-wrap canvas { display: block; border-radius: 2px; }
  .leaf-wrap.flip-fwd-out { transform: rotateY(-12deg) translateX(-22px); opacity: 0; }
  .leaf-wrap.flip-back-out { transform: rotateY(12deg) translateX(22px); opacity: 0; }
  .leaf-wrap.flip-in { transform: rotateY(0) translateX(0); opacity: 1; }

  #spread { display: flex; align-items: stretch; gap: 0; }
  #spread .spine {
    width: 26px; flex-shrink: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.18), rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.0) 70%, rgba(0,0,0,0.18));
  }
  #spread.single-mode .leaf.right, #spread.single-mode .spine { display: none; }
  #spread .leaf.left .leaf-wrap { border-radius: 2px 0 0 2px; }
  #spread .leaf.right .leaf-wrap { border-radius: 0 2px 2px 0; }

  #scroll-container { width: min(820px, 92vw); height: 100%; overflow-y: auto; padding: 40px 0 80px; scroll-behavior: smooth; }
  #scroll-container .scroll-page { margin: 0 auto 18px; background: var(--paper); box-shadow: 0 18px 44px var(--paper-shadow); border-radius: 2px; }
  #scroll-container .scroll-page canvas { display: block; border-radius: 2px; }

  [data-theme="night"] .leaf-wrap canvas, [data-theme="night"] .scroll-page canvas { filter: invert(0.93) hue-rotate(180deg) contrast(0.92); }
  [data-theme="night"] .leaf-wrap, [data-theme="night"] .scroll-page { background: #15140f; box-shadow: 0 26px 60px rgba(0,0,0,0.6); }
  [data-theme="sepia"] .leaf-wrap canvas, [data-theme="sepia"] .scroll-page canvas { filter: sepia(0.42) saturate(1.05) brightness(0.97); }
  [data-theme="sepia"] .leaf-wrap, [data-theme="sepia"] .scroll-page { background: #ecdfc2; }

  /* ---------- Drawer (TOC / Library) ---------- */
  #drawer {
    position: absolute; top: 0; bottom: 0; left: 0; width: 300px;
    background: rgba(18,15,10,0.97); border-right: 1px solid rgba(180,138,79,0.18);
    z-index: 40; transform: translateX(-100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column; padding: 60px 0 20px;
    backdrop-filter: blur(6px);
  }
  #drawer.open { transform: translateX(0); }
  #drawer h2 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brass); margin: 0 0 10px; padding: 0 20px; }
  #drawer .drawer-section { padding-bottom: 18px; border-bottom: 1px solid rgba(180,138,79,0.12); margin-bottom: 14px; overflow-y: auto; }
  #toc-tree { padding: 0 20px; overflow-y: auto; flex: 1; }
  #toc-tree ul { list-style: none; margin: 0; padding-left: 14px; }
  #toc-tree > ul { padding-left: 0; }
  #toc-tree a { color: var(--chrome-text-dim); text-decoration: none; font-size: 13px; line-height: 2; display: block; }
  #toc-tree a:hover { color: var(--brass-bright); }
  #toc-empty { padding: 0 20px; font-size: 12px; color: var(--chrome-text-dim); }

  /* ---------- Zoom popover ---------- */
  #zoom-pop {
    position: absolute; top: 50px; right: 18px; background: rgba(18,15,10,0.97);
    border: 1px solid rgba(180,138,79,0.25); border-radius: 8px; padding: 10px;
    display: none; flex-direction: column; gap: 6px; z-index: 35; width: 168px;
  }
  #zoom-pop.open { display: flex; }
  #zoom-pop button { background: transparent; border: 1px solid rgba(180,138,79,0.25); color: var(--chrome-text-dim); padding: 7px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; text-align: left; }
  #zoom-pop button:hover { color: var(--brass-bright); border-color: var(--brass); }
  #zoom-pop .row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  #zoom-pop .row button { flex: 1; text-align: center; padding: 6px; }

  #drop-veil {
    position: fixed; inset: 0; background: rgba(180,138,79,0.08); border: 3px dashed var(--brass-bright);
    z-index: 100; display: none; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 22px; color: var(--brass-bright); pointer-events: none;
  }
  #drop-veil.show { display: flex; }

  #toast {
    position: absolute; bottom: 92px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: rgba(18,15,10,0.95); border: 1px solid rgba(180,138,79,0.3); color: var(--chrome-text);
    padding: 9px 16px; border-radius: 20px; font-size: 12.5px; z-index: 60;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(180,138,79,0.35); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--brass-bright); outline-offset: 2px; }

  @media (max-width: 720px) {
    #book-title { max-width: 36vw; font-size: 12px; }
    #drawer { width: 84vw; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="empty-state">
    <div class="clasp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="4" y="3" width="16" height="18" rx="1.5"/><path d="M8 3v18M12 8h6M12 12h6M12 16h4"/></svg>
    </div>
    <h1>Folio</h1>
    <p>Drop a PDF here, or click to choose one. It opens like a book — paginated, themed, and remembers exactly where you left off.</p>
    <div class="hint">Click or drag a .pdf file</div>
    <div id="library-list"></div>
  </div>

  <div id="book" hidden>
    <div id="chrome-top">
      <div class="chrome-btns">
        <button class="icon-btn" id="btn-drawer" title="Contents &amp; library (T)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h10M4 18h16"/></svg>
        </button>
        <span id="book-title">—</span>
      </div>
      <div class="chrome-btns">
        <button class="icon-btn" id="btn-spread" title="Toggle two-page spread">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="8" height="16" rx="1"/><rect x="13" y="4" width="8" height="16" rx="1"/></svg>
        </button>
        <button class="icon-btn" id="btn-scroll" title="Toggle scroll mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
        </button>
        <button class="icon-btn" id="btn-zoom" title="Zoom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <button class="icon-btn" id="btn-theme" title="Reading theme (D)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36A5.4 5.4 0 0112 3z"/></svg>
        </button>
        <button class="icon-btn" id="btn-fullscreen" title="Fullscreen (F)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 3H4v4M16 3h4v4M8 21H4v-4M16 21h4v-4"/></svg>
        </button>
        <button class="icon-btn" id="btn-open" title="Open another PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7l2-3h12l2 3M4 7h16v13H4V7z"/></svg>
        </button>
      </div>
    </div>

    <div id="book-stage">
      <div id="page-viewport">
        <div id="spread">
          <div class="leaf left"><div class="leaf-wrap"><canvas id="canvas-left"></canvas></div></div>
          <div class="spine"></div>
          <div class="leaf right"><div class="leaf-wrap"><canvas id="canvas-right"></canvas></div></div>
        </div>
        <div id="scroll-container" hidden></div>
      </div>
    </div>

    <div id="chrome-bottom">
      <div id="progress-thread">
        <div id="progress-fill"></div>
        <div id="progress-handle"></div>
      </div>
      <div id="page-indicator">Page <b id="pi-current">1</b> of <b id="pi-total">1</b> · <span id="pi-pct">0%</span> read</div>
    </div>

    <div id="zoom-pop">
      <div class="row">
        <button id="zoom-out">−</button>
        <span id="zoom-val" style="font-size:12px;color:var(--chrome-text-dim);min-width:42px;text-align:center;">100%</span>
        <button id="zoom-in">+</button>
      </div>
      <button id="zoom-fit-width">Fit width</button>
      <button id="zoom-fit-page">Fit page</button>
    </div>

    <div id="drawer">
      <div class="drawer-section" style="max-height:34%;">
        <h2>Library</h2>
        <div id="library-list-drawer" style="padding:0 20px; display:flex; flex-direction:column; gap:4px;"></div>
      </div>
      <h2 style="padding:0 20px;">Contents</h2>
      <div id="toc-tree"></div>
    </div>
  </div>

  <input type="file" id="file-input" accept="application/pdf" hidden />
  <div id="drop-veil">Drop to open</div>
  <div id="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const els = {
  app: document.getElementById('app'),
  emptyState: document.getElementById('empty-state'),
  libList: document.getElementById('library-list'),
  libListDrawer: document.getElementById('library-list-drawer'),
  book: document.getElementById('book'),
  fileInput: document.getElementById('file-input'),
  dropVeil: document.getElementById('drop-veil'),
  toast: document.getElementById('toast'),
  bookTitle: document.getElementById('book-title'),
  spread: document.getElementById('spread'),
  canvasLeft: document.getElementById('canvas-left'),
  canvasRight: document.getElementById('canvas-right'),
  leafLeft: document.querySelector('#spread .leaf.left .leaf-wrap'),
  leafRight: document.querySelector('#spread .leaf.right .leaf-wrap'),
  scrollContainer: document.getElementById('scroll-container'),
  progressThread: document.getElementById('progress-thread'),
  progressFill: document.getElementById('progress-fill'),
  progressHandle: document.getElementById('progress-handle'),
  piCurrent: document.getElementById('pi-current'),
  piTotal: document.getElementById('pi-total'),
  piPct: document.getElementById('pi-pct'),
  drawer: document.getElementById('drawer'),
  tocTree: document.getElementById('toc-tree'),
  zoomPop: document.getElementById('zoom-pop'),
  zoomVal: document.getElementById('zoom-val'),
  btnDrawer: document.getElementById('btn-drawer'),
  btnSpread: document.getElementById('btn-spread'),
  btnScroll: document.getElementById('btn-scroll'),
  btnZoom: document.getElementById('btn-zoom'),
  btnTheme: document.getElementById('btn-theme'),
  btnFullscreen: document.getElementById('btn-fullscreen'),
  btnOpen: document.getElementById('btn-open'),
};

let state = {
  pdfDoc: null,
  bookId: null,
  fileName: '',
  totalPages: 1,
  currentPage: 1,
  scale: 1,
  zoomMode: 'fit-width', // fit-width | fit-page | custom
  mode: 'page',          // page | scroll
  spreadOn: true,
  theme: 'day',           // day | sepia | night
  rendering: false,
};

const THEMES = ['day', 'sepia', 'night'];

// ---------------- Storage helpers ----------------
function hashId(name, size) {
  let h = 0;
  const str = name + ':' + size;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return 'b' + Math.abs(h);
}
async function loadLibrary() {
  try {
    const v = localStorage.getItem('folio:library');
    return v ? JSON.parse(v) : [];
  } catch (e) { return []; }
}
async function saveLibrary(list) {
  try { localStorage.setItem('folio:library', JSON.stringify(list.slice(0, 12))); } catch (e) {}
}
async function upsertLibraryEntry(entry) {
  const list = await loadLibrary();
  const idx = list.findIndex(b => b.id === entry.id);
  if (idx >= 0) list[idx] = { ...list[idx], ...entry };
  else list.unshift(entry);
  list.sort((a, b) => b.lastOpened - a.lastOpened);
  await saveLibrary(list);
  return list;
}
async function saveProgress() {
  if (!state.bookId) return;
  try {
    localStorage.setItem('folio:book:' + state.bookId, JSON.stringify({
      page: state.currentPage, theme: state.theme, mode: state.mode, spreadOn: state.spreadOn, zoomMode: state.zoomMode
    }));
  } catch (e) {}
  await upsertLibraryEntry({
    id: state.bookId, name: state.fileName, totalPages: state.totalPages,
    lastPage: state.currentPage, lastOpened: Date.now()
  });
}
async function loadProgress(id) {
  try {
    const v = localStorage.getItem('folio:book:' + id);
    return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}

function showToast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => els.toast.classList.remove('show'), 2200);
}

// ---------------- Library UI (empty state) ----------------
async function renderLibraryLists() {
  const list = await loadLibrary();
  const build = (container, withReopen) => {
    container.innerHTML = '';
    if (!list.length) {
      if (container === els.libListDrawer) container.innerHTML = '<div style="font-size:12px;color:var(--chrome-text-dim);">No books yet.</div>';
      return;
    }
    list.forEach(b => {
      const btn = document.createElement('button');
      const pct = Math.round((b.lastPage / Math.max(b.totalPages,1)) * 100);
      btn.innerHTML = `<span>${escapeHtml(b.name)}</span><span class="pct">${pct}%</span>`;
      btn.onclick = () => { pendingReopenId = b.id; els.fileInput.click(); };
      container.appendChild(btn);
    });
  };
  build(els.libList);
  build(els.libListDrawer);
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let pendingReopenId = null;

// ---------------- File opening ----------------
els.emptyState.addEventListener('click', () => { pendingReopenId = null; els.fileInput.click(); });
els.btnOpen.addEventListener('click', () => { pendingReopenId = null; els.fileInput.click(); });
els.fileInput.addEventListener('change', (e) => { if (e.target.files[0]) openFile(e.target.files[0]); });

['dragenter','dragover'].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault();
  if ([...e.dataTransfer.items].some(i => i.type === 'application/pdf')) els.dropVeil.classList.add('show');
}));
['dragleave','drop'].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault();
  els.dropVeil.classList.remove('show');
}));
document.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') { pendingReopenId = null; openFile(f); }
});

async function openFile(file) {
  if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
    showToast('That doesn\'t look like a PDF.'); return;
  }
  const id = hashId(file.name, file.size);
  if (pendingReopenId && pendingReopenId !== id) {
    showToast('Different file selected — opening it fresh.');
  }
  const buf = await file.arrayBuffer();
  try {
    const loadingTask = pdfjsLib.getDocument({ data: buf });
    const pdfDoc = await loadingTask.promise;
    state.pdfDoc = pdfDoc;
    state.bookId = id;
    state.fileName = file.name.replace(/\.pdf$/i, '');
    state.totalPages = pdfDoc.numPages;
    state.currentPage = 1;
    state.scale = 1;
    state.zoomMode = 'fit-width';
    state.theme = 'day';
    state.mode = 'page';
    state.spreadOn = window.innerWidth > 900;

    const saved = await loadProgress(id);
    if (saved) {
      state.currentPage = Math.min(saved.page || 1, state.totalPages);
      state.theme = saved.theme || 'day';
      state.mode = saved.mode || 'page';
      state.spreadOn = saved.spreadOn ?? state.spreadOn;
      state.zoomMode = saved.zoomMode || 'fit-width';
    }

    els.emptyState.style.display = 'none';
    els.book.hidden = false;
    els.bookTitle.textContent = state.fileName;
    document.documentElement.setAttribute('data-theme', state.theme);
    applyModeUI();
    await buildToc();
    await renderCurrent();
    await upsertLibraryEntry({ id, name: state.fileName, totalPages: state.totalPages, lastPage: state.currentPage, lastOpened: Date.now() });
    revealChromeBriefly();
    showToast(saved ? 'Welcome back — resumed where you left off.' : 'Opened ' + state.fileName);
  } catch (err) {
    console.error(err);
    showToast('Could not open that PDF.');
  }
  els.fileInput.value = '';
}

// ---------------- Rendering ----------------
async function getFitScale(pageNum, mode) {
  const page = await state.pdfDoc.getPage(pageNum);
  const base = page.getViewport({ scale: 1 });
  const vw = document.getElementById('page-viewport');
  const availH = vw.clientHeight - 24;
  const availW = state.spreadOn && state.mode === 'page' ? (vw.clientWidth - 26) / 2 - 24 : Math.min(vw.clientWidth - 40, 760);
  if (mode === 'fit-page') return Math.min(availW / base.width, availH / base.height);
  return availW / base.width; // fit-width
}

async function renderToCanvas(canvas, pageNum, scaleOverride) {
  const page = await state.pdfDoc.getPage(pageNum);
  const scale = scaleOverride || await getFitScale(pageNum, state.zoomMode === 'custom' ? null : state.zoomMode) * (state.zoomMode === 'custom' ? state.scale : 1);
  const finalScale = state.zoomMode === 'custom' ? (await getFitScale(pageNum, 'fit-width')) * state.scale : scale;
  const dpr = window.devicePixelRatio || 1;
  const viewport = page.getViewport({ scale: finalScale * dpr });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / dpr) + 'px';
  canvas.style.height = (viewport.height / dpr) + 'px';
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
}

async function renderCurrent() {
  if (!state.pdfDoc || state.rendering) return;
  state.rendering = true;
  if (state.mode === 'page') {
    els.spread.classList.toggle('single-mode', !state.spreadOn);
    await renderToCanvas(els.canvasLeft, state.currentPage);
    if (state.spreadOn && state.currentPage + 1 <= state.totalPages) {
      els.leafRight.style.visibility = 'visible';
      await renderToCanvas(els.canvasRight, state.currentPage + 1);
    } else if (state.spreadOn) {
      els.leafRight.style.visibility = 'hidden';
    }
  } else {
    await renderScrollMode();
  }
  updateProgressUI();
  state.rendering = false;
}

async function renderScrollMode() {
  if (els.scrollContainer.dataset.built === String(state.bookId)) return;
  els.scrollContainer.innerHTML = '';
  els.scrollContainer.dataset.built = String(state.bookId);
  const vw = els.scrollContainer.clientWidth - 40;
  for (let i = 1; i <= state.totalPages; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'scroll-page';
    wrap.dataset.page = i;
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    els.scrollContainer.appendChild(wrap);
  }
  const observer = new IntersectionObserver(entries => {
    entries.forEach(en => {
      const p = Number(en.target.dataset.page);
      if (en.isIntersecting) {
        if (!en.target.dataset.rendered) {
          state.pdfDoc.getPage(p).then(page => {
            const base = page.getViewport({ scale: 1 });
            const scale = (vw / base.width) * (state.zoomMode === 'custom' ? state.scale : 1);
            const dpr = window.devicePixelRatio || 1;
            const viewport = page.getViewport({ scale: scale * dpr });
            const canvas = en.target.querySelector('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            canvas.style.width = (viewport.width / dpr) + 'px';
            canvas.style.height = (viewport.height / dpr) + 'px';
            page.render({ canvasContext: canvas.getContext('2d'), viewport });
            en.target.dataset.rendered = '1';
          });
        }
        state.currentPage = p;
        updateProgressUI();
      }
    });
  }, { root: els.scrollContainer, threshold: 0.5 });
  [...els.scrollContainer.children].forEach(c => observer.observe(c));

  const targetPage = els.scrollContainer.children[state.currentPage - 1];
  if (targetPage) targetPage.scrollIntoView();
}

function updateProgressUI() {
  els.piCurrent.textContent = state.currentPage;
  els.piTotal.textContent = state.totalPages;
  const pct = Math.round((state.currentPage / state.totalPages) * 100);
  els.piPct.textContent = pct + '%';
  els.progressFill.style.width = pct + '%';
  els.progressHandle.style.left = pct + '%';
  saveProgress();
}

// ---------------- Navigation with page-turn animation ----------------
async function goToPage(num, animate) {
  if (!state.pdfDoc) return;
  num = Math.max(1, Math.min(num, state.totalPages));
  if (num === state.currentPage && !animate) return;
  const forward = num > state.currentPage;
  state.currentPage = num;

  if (state.mode === 'scroll') {
    const target = els.scrollContainer.children[num - 1];
    if (target) target.scrollIntoView({ behavior: 'smooth' });
    updateProgressUI();
    return;
  }

  if (animate) {
    els.leafLeft.classList.add(forward ? 'flip-fwd-out' : 'flip-back-out');
    if (state.spreadOn) els.leafRight.classList.add(forward ? 'flip-fwd-out' : 'flip-back-out');
    await new Promise(r => setTimeout(r, 170));
  }
  await renderCurrent();
  if (animate) {
    requestAnimationFrame(() => {
      els.leafLeft.classList.remove('flip-fwd-out', 'flip-back-out');
      els.leafRight.classList.remove('flip-fwd-out', 'flip-back-out');
      els.leafLeft.classList.add('flip-in');
      els.leafRight.classList.add('flip-in');
      setTimeout(() => { els.leafLeft.classList.remove('flip-in'); els.leafRight.classList.remove('flip-in'); }, 230);
    });
  }
}
function nextPage() { goToPage(state.currentPage + (state.spreadOn && state.mode === 'page' ? 2 : 1), true); }
function prevPage() { goToPage(state.currentPage - (state.spreadOn && state.mode === 'page' ? 2 : 1), true); }

// ---------------- TOC ----------------
async function buildToc() {
  els.tocTree.innerHTML = '';
  try {
    const outline = await state.pdfDoc.getOutline();
    if (!outline || !outline.length) {
      els.tocTree.innerHTML = '<div id="toc-empty">This PDF has no table of contents.</div>';
      return;
    }
    const root = await renderOutlineLevel(outline);
    els.tocTree.appendChild(root);
  } catch (e) {
    els.tocTree.innerHTML = '<div id="toc-empty">Contents unavailable.</div>';
  }
}
async function renderOutlineLevel(items) {
  const ul = document.createElement('ul');
  for (const item of items) {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = item.title;
    a.onclick = async (e) => {
      e.preventDefault();
      try {
        let dest = item.dest;
        if (typeof dest === 'string') dest = await state.pdfDoc.getDestination(dest);
        if (dest) {
          const pageIndex = await state.pdfDoc.getPageIndex(dest[0]);
          goToPage(pageIndex + 1, true);
          els.drawer.classList.remove('open');
        }
      } catch (err) {}
    };
    li.appendChild(a);
    if (item.items && item.items.length) li.appendChild(await renderOutlineLevel(item.items));
    ul.appendChild(li);
  }
  return ul;
}

// ---------------- Mode / theme / zoom controls ----------------
function applyModeUI() {
  els.btnSpread.classList.toggle('active', state.spreadOn && state.mode === 'page');
  els.btnScroll.classList.toggle('active', state.mode === 'scroll');
  document.getElementById('page-viewport').querySelector('#spread').hidden = state.mode === 'scroll';
  els.scrollContainer.hidden = state.mode !== 'scroll';
}

els.btnSpread.addEventListener('click', () => {
  if (state.mode !== 'page') { state.mode = 'page'; }
  state.spreadOn = !state.spreadOn;
  applyModeUI(); renderCurrent();
});
els.btnScroll.addEventListener('click', () => {
  state.mode = state.mode === 'scroll' ? 'page' : 'scroll';
  applyModeUI();
  if (state.mode === 'scroll') { els.scrollContainer.dataset.built = ''; renderScrollMode(); }
  else renderCurrent();
});
els.btnTheme.addEventListener('click', () => {
  const i = (THEMES.indexOf(state.theme) + 1) % THEMES.length;
  state.theme = THEMES[i];
  document.documentElement.setAttribute('data-theme', state.theme);
  showToast('Theme: ' + state.theme[0].toUpperCase() + state.theme.slice(1));
  saveProgress();
});
els.btnFullscreen.addEventListener('click', () => {
  if (!document.fullscreenElement) els.app.requestFullscreen?.();
  else document.exitFullscreen?.();
});
els.btnDrawer.addEventListener('click', async () => { els.drawer.classList.toggle('open'); await renderLibraryLists(); });
document.addEventListener('click', (e) => {
  if (els.drawer.classList.contains('open') && !els.drawer.contains(e.target) && e.target !== els.btnDrawer && !els.btnDrawer.contains(e.target)) {
    els.drawer.classList.remove('open');
  }
  if (els.zoomPop.classList.contains('open') && !els.zoomPop.contains(e.target) && e.target !== els.btnZoom && !els.btnZoom.contains(e.target)) {
    els.zoomPop.classList.remove('open');
  }
});
els.btnZoom.addEventListener('click', () => els.zoomPop.classList.toggle('open'));
document.getElementById('zoom-in').addEventListener('click', () => { state.zoomMode = 'custom'; state.scale = Math.min((state.scale||1) + 0.1, 3); els.zoomVal.textContent = Math.round(state.scale*100)+'%'; renderCurrent(); });
document.getElementById('zoom-out').addEventListener('click', () => { state.zoomMode = 'custom'; state.scale = Math.max((state.scale||1) - 0.1, 0.4); els.zoomVal.textContent = Math.round(state.scale*100)+'%'; renderCurrent(); });
document.getElementById('zoom-fit-width').addEventListener('click', () => { state.zoomMode = 'fit-width'; state.scale = 1; els.zoomVal.textContent = '100%'; renderCurrent(); });
document.getElementById('zoom-fit-page').addEventListener('click', () => { state.zoomMode = 'fit-page'; state.scale = 1; els.zoomVal.textContent = '100%'; renderCurrent(); });

// ---------------- Progress thread interaction ----------------
els.progressThread.addEventListener('click', (e) => {
  const rect = els.progressThread.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  goToPage(Math.round(pct * state.totalPages), true);
});

// ---------------- Page-turn click zones + swipe ----------------
document.getElementById('page-viewport').addEventListener('click', (e) => {
  if (state.mode !== 'page') return;
  const w = window.innerWidth;
  if (e.clientX < w * 0.25) prevPage();
  else if (e.clientX > w * 0.75) nextPage();
});
let touchStartX = null;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60 && state.mode === 'page') { dx < 0 ? nextPage() : prevPage(); }
  touchStartX = null;
});

// ---------------- Keyboard ----------------
document.addEventListener('keydown', (e) => {
  if (!state.pdfDoc) return;
  switch (e.key) {
    case 'ArrowRight': case ' ': case 'PageDown': nextPage(); e.preventDefault(); break;
    case 'ArrowLeft': case 'PageUp': prevPage(); e.preventDefault(); break;
    case 'Home': goToPage(1, true); break;
    case 'End': goToPage(state.totalPages, true); break;
    case 't': case 'T': els.btnDrawer.click(); break;
    case 'd': case 'D': els.btnTheme.click(); break;
    case 'f': case 'F': els.btnFullscreen.click(); break;
    case 'Escape': els.drawer.classList.remove('open'); els.zoomPop.classList.remove('open'); break;
  }
});

// ---------------- Chrome auto-hide ----------------
let chromeTimer = null;
function revealChromeBriefly() {
  els.app.classList.add('chrome-visible');
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(() => { if (!els.drawer.classList.contains('open')) els.app.classList.remove('chrome-visible'); }, 2600);
}
document.addEventListener('mousemove', () => { if (state.pdfDoc) revealChromeBriefly(); });
document.addEventListener('touchstart', () => { if (state.pdfDoc) revealChromeBriefly(); }, { passive: true });

// ---------------- Resize ----------------
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!state.pdfDoc) return;
    if (state.mode === 'page') { state.spreadOn = window.innerWidth > 900 ? state.spreadOn : false; renderCurrent(); }
  }, 200);
});

// ---------------- Init ----------------
renderLibraryLists();
</script>
</body>
</html>
